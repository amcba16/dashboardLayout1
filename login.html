<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <main>
        <section class="login">
            <header class="login-header">
                <img src="img/profile.jpg" alt="logo"/>
                <h1>Sign in to your account</h1>
            </header>
            <section class="login-form">
                <form action="">
                    <div class="email-input">
                        <input type="email" autocomplete="off" required id="email-input-field" placeholder=" "/>
                        <label for="email-input-field">Enter Email</label>
                    </div>
                    <div class="email-input">
                        <input type="password" required id="password-input-field" placeholder=" "/>
                        <label for="password-input-field">Enter Password</label>
                    </div>
                    <div class="forgot-password">
                        <div class="remember-me">
                            <input type="checkbox" id="reminde-me-box">
                            <label for="reminde-me-box">Remember me</label>
                        </div>
                        <a href="#">forgot password</a>
                    </div>
                    <input type="submit" value="Sign In" id="signin"/>
                </form>
                <div class="sign-up">
                    <p>Don't Have account?</p>
                    <a href="#">Sign up</a>
                </div>
            </section>
        </section>
    </main>
</body>
</html>
